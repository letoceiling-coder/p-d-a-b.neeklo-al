server {
    server_name p-d-a-b.neeklo.ru;

    location / {
        root /var/www/p-d-a-b.neeklo.ru/web;
        index index.html;
        try_files $uri /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/p-d-a-b.neeklo.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/p-d-a-b.neeklo.ru/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = p-d-a-b.neeklo.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name p-d-a-b.neeklo.ru;
    return 404; # managed by Certbot
}
